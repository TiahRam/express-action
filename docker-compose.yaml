services:
  app:
    image: fitiavna/beermapping
    container_name: beermapping
    restart: always
    ports:
      - 3000:3000

  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
    restart: always
